<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppVault Pro v11 — Official Sources</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #f8fafc; --primary: #38bdf8; --success: #22c55e; }
        body.light-theme { --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #0f172a; --primary: #0ea5e9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.2s; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }

        /* Header & Navigation */
        .header { padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; gap: 15px; }
        .logo { font-weight: 900; color: var(--primary); text-decoration: none; font-size: 1.3rem; }
        .search-input { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 10px 15px; border-radius: 12px; color: var(--text); }
        
        /* Filters */
        .controls { max-width: 1200px; margin: 20px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 8px; }
        .btn-filter { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 6px 16px; border-radius: 50px; cursor: pointer; font-size: 0.85rem; }
        .btn-filter.active { background: var(--primary); color: #000; font-weight: bold; border-color: var(--primary); }

        /* App Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 0 20px 40px; max-width: 1200px; margin: 0 auto; }
        .app-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px; display: flex; gap: 15px; text-decoration: none; color: inherit; cursor: pointer; align-items: center; }
        .app-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .app-icon { width: 55px; height: 55px; border-radius: 12px; object-fit: contain; background: #fff; padding: 4px; }

        /* Overlay & Details */
        .overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; }
        .overlay.active { display: block; }
        .detail-box { max-width: 600px; margin: 40px auto; text-align: center; }
        .btn-dl { display: block; width: 100%; padding: 16px; background: var(--success); color: #000; font-weight: bold; border-radius: 12px; text-decoration: none; margin-top: 20px; font-size: 1.1rem; }
        .changelog { background: rgba(0,0,0,0.1); border: 1px dashed var(--border); border-radius: 12px; padding: 15px; margin-top: 20px; text-align: right; font-size: 0.9rem; }
    </style>
</head>
<body>

<header class="header">
    <a href="#" class="logo">📦 AppVault</a>
    <input type="text" id="searchInput" class="search-input" placeholder="بحث عن تطبيقات APK رسمية..." oninput="state.search = this.value; render();">
    <button class="btn-filter" onclick="document.body.classList.toggle('light-theme')">🌓</button>
</header>

<div class="controls" id="filterBar"></div>

<div class="grid" id="appGrid"></div>

<div id="dlOverlay" class="overlay">
    <div class="detail-box">
        <button class="btn-filter" onclick="location.hash=''">✕ إغلاق المعاينة</button>
        <div id="appContent" style="margin-top:25px;"></div>
    </div>
</div>

<script>
const DATABASE = [
    { id: "whatsapp", name: "واتساب", cat: "تواصل", icon: "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg", desc: "المراسلة الفورية الرسمية من Meta.", directUrl: "https://www.whatsapp.com/android/current/WhatsApp.apk" },
    { id: "telegram", name: "تيليغرام", cat: "تواصل", icon: "https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg", desc: "نسخة APK المستقلة (بدون قيود المتجر).", directUrl: "https://telegram.org/dl/android/apk" },
    { id: "newpipe", name: "نيوبايت", cat: "فيديو", icon: "https://newpipe.net/img/logo.svg", desc: "مشغل يوتيوب خفيف ومفتوح المصدر.", repo: "TeamNewPipe/NewPipe" },
    { id: "brave", name: "بريف", cat: "أدوات", icon: "https://upload.wikimedia.org/wikipedia/commons/5/51/Brave_container_icon.png", desc: "متصفح يركز على الخصوصية ومنع الإعلانات.", repo: "brave/brave-browser" }
];

let state = { search: "", filter: "الكل" };

// حماية XSS - تنظيف النص
function sanitize(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function render() {
    const grid = document.getElementById('appGrid');
    const filtered = DATABASE.filter(app => {
        const mSearch = app.name.toLowerCase().includes(state.search.toLowerCase());
        const mCat = state.filter === "الكل" || app.cat === state.filter;
        return mSearch && mCat;
    });

    grid.innerHTML = filtered.map(app => `
        <a href="#${app.id}" class="app-card">
            <img src="${app.icon}" class="app-icon">
            <div>
                <div style="font-weight:bold">${sanitize(app.name)}</div>
                <div style="font-size:0.75rem; opacity:0.7">${app.cat} • مصدر رسمي</div>
            </div>
        </a>
    `).join('');
}

function renderFilters() {
    const cats = ["الكل", ...new Set(DATABASE.map(a => a.cat))];
    document.getElementById('filterBar').innerHTML = cats.map(c => `
        <button class="btn-filter ${state.filter === c ? 'active' : ''}" onclick="state.filter='${c}'; renderFilters(); render();">${c}</button>
    `).join('');
}

async function handleRouting() {
    const id = window.location.hash.slice(1);
    const overlay = document.getElementById('dlOverlay');
    if (!id) { overlay.classList.remove('active'); return; }

    const app = DATABASE.find(a => a.id === id);
    if (!app) return;

    overlay.classList.add('active');
    const content = document.getElementById('appContent');
    content.innerHTML = `<p>جاري تحضير بيانات الإصدار من المصدر...</p>`;

    let dlLink = app.directUrl || "#";
    let changelog = "• تحديثات عامة وتحسينات أمنية واستقرار النظام.";

    if (app.repo) {
        try {
            const res = await fetch(`https://api.github.com/repos/${app.repo}/releases/latest`);
            const data = await res.json();
            const asset = data.assets.find(as => as.name.endsWith('.apk'));
            if (asset) dlLink = asset.browser_download_url;
            changelog = data.body.split('\n').filter(l => l.trim().length > 5).slice(0, 4).map(l => `• ${sanitize(l)}`).join('<br>');
        } catch(e) { console.error("API Error"); }
    }

    content.innerHTML = `
        <img src="${app.icon}" style="width:80px; margin-bottom:15px;">
        <h1>${sanitize(app.name)}</h1>
        <p style="opacity:0.8; margin-bottom:20px;">${sanitize(app.desc)}</p>
        
        <div class="changelog">
            <div style="font-weight:bold; color:var(--primary); margin-bottom:8px;">سجل التغييرات الأخير:</div>
            <div>${changelog}</div>
        </div>

        <a href="${dlLink}" class="btn-dl">تنزيل ملف APK</a>
        <p style="font-size:0.75rem; margin-top:12px; color:var(--primary)">الرابط من المصدر الرسمي للمطور</p>
    `;
}

window.onhashchange = handleRouting;
window.onload = () => { renderFilters(); render(); handleRouting(); };
</script>
</body>
</html>
